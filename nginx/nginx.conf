worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # "backend" resolves to the Spring Boot container via Docker internal DNS
    upstream spring_backend {
        server backend:8080;
    }

    # ── Tailscale Funnel — already HTTPS externally, receives plain HTTP internally
    # Tailscale terminates SSL itself and forwards plain HTTP to port 82 (→ nginx:80)
    # So we proxy directly here — no redirect needed.
    server {
        listen 8080;
        server_name pradeeps-mac-mini.tail576e0e.ts.net;

        location / {
            proxy_pass         http://spring_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;  # tell Spring Boot it came in as HTTPS
        }
    }

    # ── HTTP → HTTPS redirect (for direct localhost access) ───────────────────
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS reverse proxy ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass         http://spring_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    90s;
            proxy_connect_timeout 90s;
        }
    }
}