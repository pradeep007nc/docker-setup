services:
  db:
    build: ../docker-db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # DB port is NOT exposed to the host in production.
    # Uncomment below to connect from a local DB client (dev only):
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    # Port 8080 is NOT exposed to the host — nginx is the only entry point.
    # Uncomment the line below if you need direct access during development:
    # ports:
    #   - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "82:80"       # HTTP → localhost (redirects to HTTPS)
      - "8080:8080"   # Tailscale Funnel → plain HTTP (Tailscale already terminated SSL)
      - "8443:443"    # Direct HTTPS → https://localhost:8443
    volumes:
      # nginx.conf is read from this project — edit nginx/nginx.conf to configure proxies, SSL, etc.
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Drop your SSL certs (fullchain.pem + privkey.pem) into nginx/certs/
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  db_data:
