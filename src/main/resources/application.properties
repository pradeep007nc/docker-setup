spring.application.name=dockerbackend

# Database Configuration (Environment variable overrides)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dockerdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration (Spring manage tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=[APP] %d{HH:mm:ss} %-5level %logger{36} - %msg%n
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# Secret must be Base64-encoded, at least 256 bits. Override via env var in production.
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gc2lnbmluZyBwdXJwb3Nlcw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Master key for registering new services dynamically. Override in production.
auth.master-admin-key=${MASTER_ADMIN_KEY:master-secret-key}

# ── Document Generation (Playwright / Chrome) ──────────────────────────────
# Number of persistent browser instances (= max concurrent PDF generations).
# Each slot uses ~150-200 MB RAM. Start with 2-3 for most workloads.
docgen.browser.pool-size=${DOCGEN_POOL_SIZE:3}
# How long (ms) a single page.setContent() + page.pdf() may take before timing out.
docgen.browser.page-timeout-ms=${DOCGEN_PAGE_TIMEOUT_MS:15000}
# How long to wait (seconds) for a free browser slot before rejecting the request.
docgen.browser.acquire-timeout-seconds=${DOCGEN_ACQUIRE_TIMEOUT_S:30}
