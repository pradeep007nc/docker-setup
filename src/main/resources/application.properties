spring.application.name=dockerbackend

# Database Configuration (Environment variable overrides)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dockerdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration (Spring manage tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# Secret must be Base64-encoded, at least 256 bits. Override via env var in production.
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gc2lnbmluZyBwdXJwb3Nlcw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Master key for registering new services dynamically. Override in production.
auth.master-admin-key=${MASTER_ADMIN_KEY:master-secret-key}
